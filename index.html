<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Voxa — Native voice studio for English pronunciation practice.">
  <title>Voxa — Native Voice Studio</title>
  <link rel="icon" href="/icons/icon48.png">
  <link rel="apple-touch-icon" href="/icons/icon128.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>
    // Run early to prevent theme flash in the web version.
    try {
      const saved = JSON.parse(localStorage.getItem('voxa-settings') || '{}');
      document.documentElement.dataset.theme = saved.theme || 'light';
    } catch (_) {
      document.documentElement.dataset.theme = 'light';
    }
  </script>
  <script type="module" src="/src/main.js"></script>
</head>
<body>
  <main class="app" data-state="idle">
    <!-- Header -->
    <header class="header">
      <div class="brand">
        <div class="logo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 3v18M8 7v10M16 7v10M4 11v2M20 11v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>Voxa</h1>
          <span class="tagline">Native voice studio</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="theme-toggle" id="themeToggle" type="button" title="Toggle theme" aria-label="Toggle theme">
          <svg class="theme-icon-dark" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <path d="M11.5 8.5A4.5 4.5 0 015.5 2.5a5 5 0 106 6z" fill="currentColor"/>
          </svg>
          <svg class="theme-icon-light" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <circle cx="7" cy="7" r="2.5" fill="currentColor"/>
            <path d="M7 1v1.5M7 11.5V13M1 7h1.5M11.5 7H13M2.76 2.76l1.06 1.06M10.18 10.18l1.06 1.06M2.76 11.24l1.06-1.06M10.18 3.82l1.06-1.06" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          <svg class="theme-icon-auto" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.3" fill="none"/>
            <path d="M7 2a5 5 0 010 10z" fill="currentColor"/>
          </svg>
        </button>
        <div class="status-pill" id="statusPill">
          <span class="status-dot"></span>
          <span class="status-text">Ready</span>
        </div>
      </div>
    </header>

    <!-- Waveform Visualizer -->
    <div class="waveform" id="waveform" aria-hidden="true">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>

    <section class="content-grid" aria-label="Voice studio">
      <div class="composer-panel">
        <!-- Text Input -->
        <div class="text-section">
          <textarea
            id="textInput"
            placeholder="Type or paste English text here…"
            rows="4"
            spellcheck="false"></textarea>
          <div class="text-meta">
            <span id="charCount">0 characters</span>
            <span class="hint"><kbd>Ctrl</kbd>/<kbd>⌘</kbd><kbd>↵</kbd> to play</span>
          </div>
        </div>
      </div>

      <div class="controls-panel">
        <!-- Voice Selector -->
        <div class="control-group">
          <label class="control-label">
            <span>Voice</span>
            <span class="control-value" id="voiceCount">—</span>
          </label>
          <div class="select-wrapper">
            <select id="voiceSelect"></select>
            <svg class="select-icon" width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
              <path d="M2.5 4.5L6 8l3.5-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
        </div>

        <!-- Speed Control -->
        <div class="control-group">
          <label class="control-label">
            <span>Speed</span>
            <span class="control-value" id="rateValue">1.00×</span>
          </label>
          <div class="slider-wrapper">
            <input type="range" id="rateSlider" min="0.5" max="2.0" step="0.05" value="1.0" class="slider">
            <div class="slider-marks">
              <span>0.5</span>
              <span class="mark-best">1.0</span>
              <span>2.0</span>
            </div>
          </div>
        </div>

        <!-- Pitch Control -->
        <div class="control-group">
          <label class="control-label">
            <span>Pitch</span>
            <span class="control-value" id="pitchValue">1.0</span>
          </label>
          <div class="slider-wrapper">
            <input type="range" id="pitchSlider" min="0.5" max="2.0" step="0.1" value="1.0" class="slider">
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="actions">
          <button id="speakBtn" class="btn-primary" type="button">
            <svg class="btn-icon icon-play" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M3 2.5l8 4.5-8 4.5v-9z" fill="currentColor"/>
            </svg>
            <svg class="btn-icon icon-loading" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5" stroke-dasharray="8 4" fill="none"/>
            </svg>
            <svg class="btn-icon icon-speaking" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <rect x="2" y="5" width="2" height="4" fill="currentColor"/>
              <rect x="6" y="3" width="2" height="8" fill="currentColor"/>
              <rect x="10" y="6" width="2" height="2" fill="currentColor"/>
            </svg>
            <span class="btn-label-idle">Play</span>
            <span class="btn-label-loading">Preparing</span>
            <span class="btn-label-speaking">Speaking…</span>
            <span class="btn-label-paused">Paused</span>
          </button>
          <button id="pauseBtn" class="btn-secondary" type="button" disabled aria-label="Pause or resume">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <rect x="3" y="2" width="3" height="10" fill="currentColor"/>
              <rect x="8" y="2" width="3" height="10" fill="currentColor"/>
            </svg>
          </button>
          <button id="stopBtn" class="btn-secondary" type="button" disabled aria-label="Stop">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <rect x="2.5" y="2.5" width="9" height="9" fill="currentColor"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Practice Phrases -->
      <div class="practice-section">
        <div class="section-divider">
          <span>Practice</span>
        </div>
        <div class="practice-grid">
          <button class="practice-card" data-text="I'd like to get a better understanding of your current infrastructure." data-tag="Business">
            <span class="practice-tag">Business</span>
            <span class="practice-text">I'd like to get a better understanding…</span>
          </button>
          <button class="practice-card" data-text="What are you doing this weekend? I'm gonna grab a coffee." data-tag="Casual">
            <span class="practice-tag">Casual</span>
            <span class="practice-text">What are you doing this weekend?</span>
          </button>
          <button class="practice-card" data-text="Did you eat yet? No, did you?" data-tag="Linking">
            <span class="practice-tag">Linking</span>
            <span class="practice-text">Did you eat yet? No, did you?</span>
          </button>
          <button class="practice-card" data-text="The quick brown fox jumps over the lazy dog." data-tag="Pangram">
            <span class="practice-tag">Pangram</span>
            <span class="practice-text">The quick brown fox jumps over…</span>
          </button>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <div class="shortcuts">
        <span><kbd>Ctrl</kbd>/<kbd>⌘</kbd><kbd>↵</kbd> play</span>
        <span class="dot">·</span>
        <span>Web Speech API</span>
      </div>
    </footer>
  </main>
</body>
</html>
